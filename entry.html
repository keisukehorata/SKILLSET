<!doctype html>
<html lang="ja">
<meta name="author" content="skilset">
<meta name="description" content="プログラミングを学んで人生を広げよう">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.ico" type="image/x-icon"/>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/style.css">
<title>SKILSET</title>
<meta name="viewpot" content="width=device-width, initial=scale=1">
</head>

<body>
	<header>
		<h1 class="site-title">
			<a href="index.html">
				<img src="img/logo.png" alt="SKILSET">
			</a>
		</h1>
		<nav class="gbnav">
		<ul>
			<li><a href="index.html">ホーム</a></li>
			<li><a href="course.html">コース紹介</a></li>
			<li><a href="price.html">受講料金</a></li>
			<li><a href="access.html">アクセス</a></li>
			<li><a href="entry.html">体験授業お申し込み</a></li>
			</ul>
		</nav>
	</header>
	<main>
		<div class="content">
			<div class="form">
				<dl>
					<dt>ご希望のコース</dt>
					<dd><input type="radio" name="ご希望のコース" value="ロボットプログラミングコース">ロボットプログラミングコース
					<input type="radio" name="ご希望のコース" value="Scratchプログラミングコース">Scratchプログラミングコース</dd>
				</dl>
				<dl>
					<dt>ご希望の日時</dt>
					<dd><input type="date" name="ご希望の日時"></dd>
				</dl>
				<dl>
					<dt>お子様のお名前</dt>
					<dd><input type="text" name="お子様の名前" placeholder="田中 太郎"></dd>
				</dl>
				<dl>
					<dt>ふりがな</dt>
					<dd><input type="text" name="ふりがな" placeholder="たなか たろう"></dd>
				</dl>
				<dl>
					<dt>学年</dt>
					<dd><select name="学年">
							<option value="">選択してください</option>
							<option value="未就学児">未就学児</option>
							<option value="小学1年">小学1年</option>
							<option value="小学2年">小学2年</option>
							<option value="小学3年">小学3年</option>
							<option value="小学4年">小学4年</option>
							<option value="小学5年">小学5年</option>
							<option value="小学6年">小学6年</option>
							<option value="中学1年">中学1年</option>
							<option value="中学2年">中学2年</option>
							<option value="中学3年">中学3年</option>
						</select>
					</dd>
				</dl>
				<dl>
					<dt>メールアドレス</dt>
					<dd><input type="email" name="Email" placeholder="sample@test.com"></dd>
				</dl>
				<dl>
					<dt>サイトを知ったきっかけ</dt>
					<dd><input type="checkbox" name="サイトを知ったきっかけ[]"　value="友人・知人">友人・知人
						<input type="checkbox" name="サイトを知ったきっかけ[]"　value="検索エンジン">検索エンジン
						<input type="checkbox" name="サイトを知ったきっかけ[]"　value="SNS">SNS
						<input type="checkbox" name="サイトを知ったきっかけ[]"　value="学校からの案内">学校からの案内
						<input type="checkbox" name="サイトを知ったきっかけ[]"　value="その他">その他
					</dd>
				</dl>
				<dl>
					<dt>コメント・備考など</dt>
					<dd><textarea name="コメント・備考など" rows="10"></textarea></dd>
				</dl>
				
				<div class="btn">
					<input type="submit" value="送信する">
				</div>
				</div>
			</div>
	</main>
	
	<footer id="footer">
	<nav class="ftnav">
		<ul class="sitemap">
			<li>
				<a href="#">サイトマップ</a>
			</li>
			<li>
				<a href="#">プライバシーポリシー</a>
			</li>
		</ul>
		</nav>
		<small>&copy; 2022 プログラミング学習塾SKILSET.</small>
	</footer>
</body>
</html>
